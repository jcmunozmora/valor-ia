project:
  type: website
  output-dir: ../docs

website:
  title: "Valor Público — VALOR·IA"
  description: "Plataforma de inteligencia para la medicion de valor social · CVP EAFIT"
  favicon: images/favicon.svg

  navbar:
    background: "#0F172A"
    foreground: light
    pinned: true
    left:
      - href: index.qmd
        text: Inicio
      - href: metodologia.qmd
        text: Metodología
      - href: ciencia.qmd
        text: Ciencia del Impacto
      - href: herramientas.qmd
        text: "Nuestros Servicios"
      - href: aplicaciones.qmd
        text: Aplicaciones
      - href: equipo.qmd
        text: Equipo
    right:
      - text: "CVP · EAFIT"
        href: "https://www.eafit.edu.co"

  page-footer:
    background: "#0F172A"
    foreground: light
    left: "Centro Valor Público · Universidad EAFIT"
    center: "Valor Público — VALOR·IA · Midiendo lo que importa"
    right: "© 2026"

  sidebar: false

  open-graph:
    title: "Valor Público — VALOR·IA · CVP EAFIT"
    description: "Plataforma de inteligencia para la medicion de valor social — SROI, CBA, WELLBY"
    image: images/og-image.png

format:
  html:
    theme: [cosmo, styles.scss]
    toc: false
    smooth-scroll: true
    highlight-style: arrow-dark
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
